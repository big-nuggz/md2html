<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{title}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {{
            darkMode: 'class',
        }};
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="{css_path}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>hljs.highlightAll();</script>
</head>
<body class="min-h-screen flex flex-col bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100">
    <!-- Top Navigation -->
    <nav class="sticky top-0 z-[100] flex items-center gap-3 px-6 py-3 border-b border-gray-200 dark:border-gray-800 bg-white/90 dark:bg-gray-950/90 backdrop-blur">
        <button class="nav-toggle lg:hidden p-1.5 rounded hover:bg-gray-100 dark:hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500" id="navToggle" aria-label="Toggle navigation menu">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <a href="{index_path}" class="text-blue-600 dark:text-blue-400 hover:underline text-sm whitespace-nowrap">&larr; Home</a>
        <span class="font-semibold truncate">{title}</span>
    </nav>

    <!-- Side Navigation -->
    <aside class="side-nav fixed top-14 left-0 z-[200] w-64 h-[calc(100vh-3.5rem)] overflow-y-auto border-r border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-950 transition-transform duration-250 -translate-x-full lg:translate-x-0 flex flex-col" id="sideNav">
        <div class="px-4 py-3 font-bold text-xs uppercase tracking-wider text-gray-500 dark:text-gray-400 border-b border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-gray-900 flex-shrink-0">Pages</div>
        <div class="flex-1 overflow-y-auto py-2" id="sideNavTree"></div>
    </aside>

    <!-- Overlay -->
    <div class="nav-overlay fixed inset-0 bg-black/40 z-[150] opacity-0 pointer-events-none transition-opacity duration-250" id="navOverlay"></div>

    <!-- Main Content -->
    <main class="content flex-1 max-w-4xl mx-auto px-6 py-8 w-full lg:ml-64">
{body}
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-200 dark:border-gray-800 py-4 text-center text-sm text-gray-500 dark:text-gray-400 lg:ml-64">
        <p>Generated by dividendos &mdash; <a href="{index_path}" class="text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400">Back to index</a></p>
    </footer>

    <script src="{js_path}"></script>
</body>
</html>
